<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Vía Segura</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f0f1a;color:#fff;min-height:100vh}
    .topbar{background:#1a1a2e;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2a4a}
    .topbar-title{font-size:18px;font-weight:600;color:#5DCAA5}
    .logout-btn{padding:6px 14px;border-radius:8px;border:1px solid #E24B4A;background:transparent;color:#E24B4A;cursor:pointer;font-size:13px}
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-card{background:#1a1a2e;border-radius:16px;padding:32px;width:320px;border:1px solid #2a2a4a}
    .login-title{font-size:20px;font-weight:600;margin-bottom:6px;color:#5DCAA5}
    .login-sub{font-size:13px;color:#71717a;margin-bottom:24px}
    .input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #2a2a4a;background:#0f0f1a;color:#fff;font-size:13px;margin-bottom:12px}
    .btn{width:100%;padding:12px;border-radius:8px;border:none;background:#185FA5;color:#fff;font-size:14px;font-weight:500;cursor:pointer}
    .btn:hover{background:#1470c0}
    .dashboard{display:none;padding:24px}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
    .stat-card{background:#1a1a2e;border-radius:12px;padding:16px;border:1px solid #2a2a4a}
    .stat-val{font-size:32px;font-weight:600;color:#5DCAA5}
    .stat-lbl{font-size:12px;color:#71717a;margin-top:4px}
    .table-wrap{background:#1a1a2e;border-radius:12px;border:1px solid #2a2a4a;overflow:hidden}
    .table-head{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2a4a}
    .table-head h3{font-size:15px;font-weight:500}
    .del-all-btn{padding:6px 14px;border-radius:8px;border:1px solid #E24B4A;background:transparent;color:#E24B4A;cursor:pointer;font-size:12px}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;padding:12px 16px;font-size:11px;color:#71717a;font-weight:500;border-bottom:1px solid #2a2a4a;text-transform:uppercase}
    td{padding:12px 16px;font-size:13px;border-bottom:1px solid #1a1a2e;vertical-align:top}
    tr:hover td{background:#1f1f35}
    .del-btn{padding:4px 10px;border-radius:6px;border:1px solid #E24B4A;background:transparent;color:#E24B4A;cursor:pointer;font-size:11px}
    .badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;background:#FCEBEB;color:#A32D2D}
    .empty{padding:40px;text-align:center;color:#71717a;font-size:13px}
    .error-msg{color:#E24B4A;font-size:12px;margin-top:8px;text-align:center}
  </style>
</head>
<body>

<div class="topbar" id="topbar" style="display:none">
  <div class="topbar-title"><i class="ti ti-shield-lock"></i> Vía Segura Admin</div>
  <button class="logout-btn" onclick="logout()"><i class="ti ti-logout"></i> Cerrar sesión</button>
</div>

<!-- LOGIN -->
<div class="login-wrap" id="login-section">
  <div class="login-card">
    <div class="login-title"><i class="ti ti-shield-lock"></i> Panel Admin</div>
    <div class="login-sub">Acceso restringido — Solo administradores</div>
    <input class="input" type="text" id="admin-user" placeholder="Usuario">
    <input class="input" type="password" id="admin-pass" placeholder="Contraseña">
    <button class="btn" onclick="doAdminLogin()">Ingresar</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="admin-dashboard">
  <div class="stats">
    <div class="stat-card">
      <div class="stat-val" id="a-total">0</div>
      <div class="stat-lbl">Total reportes</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="a-hoy">0</div>
      <div class="stat-lbl">Reportes hoy</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="a-semana">0</div>
      <div class="stat-lbl">Esta semana</div>
    </div>
  </div>
  <div class="table-wrap">
    <div class="table-head">
      <h3>Todos los reportes</h3>
      <button class="del-all-btn" onclick="deleteAll()"><i class="ti ti-trash"></i> Eliminar todos</button>
    </div>
    <div id="table-body"></div>
  </div>
</div>

<script>
const API = 'https://via-segura-liart.vercel.app/api/admin';
let token = localStorage.getItem('adminToken');

async function doAdminLogin() {
  const username = document.getElementById('admin-user').value;
  const password = document.getElementById('admin-pass').value;
  const errEl = document.getElementById('login-error');
  try {
    const res = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (!res.ok) { errEl.textContent = 'Usuario o contraseña incorrectos'; return; }
    const data = await res.json();
    token = data.token;
    localStorage.setItem('adminToken', token);
    showDashboard();
  } catch {
    errEl.textContent = 'Error conectando al servidor';
  }
}

function showDashboard() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('admin-dashboard').style.display = 'block';
  loadReports();
}

function logout() {
  localStorage.removeItem('adminToken');
  token = null;
  document.getElementById('login-section').style.display = 'flex';
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('admin-dashboard').style.display = 'none';
}

async function loadReports() {
  try {
    const res = await fetch(API + '/reports', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    const reports = await res.json();
    const now = new Date();
    const hoy = reports.filter(r => new Date(r.created_at).toDateString() === now.toDateString());
    const semana = reports.filter(r => (now - new Date(r.created_at)) < 7*24*60*60*1000);
    document.getElementById('a-total').textContent = reports.length;
    document.getElementById('a-hoy').textContent = hoy.length;
    document.getElementById('a-semana').textContent = semana.length;
    const body = document.getElementById('table-body');
    if (reports.length === 0) {
      body.innerHTML = '<div class="empty">No hay reportes.</div>'; return;
    }
    body.innerHTML = `<table>
      <thead><tr>
        <th>Tipo</th><th>Vehículo</th><th>Coordenadas</th><th>Fecha</th><th></th>
      </tr></thead>
      <tbody>${reports.map(r => `
        <tr>
          <td><span class="badge">${r.title||'—'}</span></td>
          <td style="color:#a1a1aa">${r.sub||'—'}</td>
          <td style="color:#71717a;font-size:11px">${r.lat&&r.lng?r.lat.toFixed(4)+', '+r.lng.toFixed(4):'Sin coords'}</td>
          <td style="color:#71717a;font-size:11px">${new Date(r.created_at).toLocaleString('es-CO')}</td>
          <td><button class="del-btn" onclick="deleteReport(${r.id})"><i class="ti ti-trash"></i></button></td>
        </tr>
      `).join('')}</tbody>
    </table>`;
  } catch {
    document.getElementById('table-body').innerHTML = '<div class="empty">Error cargando reportes.</div>';
  }
}

async function deleteReport(id) {
  if (!confirm('¿Eliminar este reporte?')) return;
  await fetch(API + '/reports/' + id, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  });
  loadReports();
}

async function deleteAll() {
  if (!confirm('¿Eliminar TODOS los reportes? Esta acción no se puede deshacer.')) return;
  await fetch(API + '/reports', {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  });
  loadReports();
}

// Auto-login si ya tiene token
if (token) showDashboard();
</script>
</body>
</html>
